services:
  app:
    build:
      context: .
      dockerfile: dockerfile
      target: dev
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:8.0-alpine
    restart: always
    ports:
      - '6378:6379'

volumes:
  mysql-data:
    driver: local
